# some params are needed to work but are not really used in testing
#### datasets
datasets:
  name: BVI_Lowlight
  train:
    n_workers: 4  # per GPU
    verbose: True
  val:
    test_path: ./data/datasets/BVI-Lowlight
    batch_size_test: 1
  temporal_window: 3
  frame_stride: 1
  split_seed: 2025
  train_ratio: 0.8
  split: test

#### network structures
network:
  name: DarkIR
  resume_training: True
  img_channels: 3
  width: 32
  middle_blk_num_enc: 2
  middle_blk_num_dec: 2
  enc_blk_nums: [1, 2, 3]
  dec_blk_nums: [3, 1, 1]
  dilations: [1, 4, 9]
  extra_depth_wise: True
  temporal_window: 3
  temporal_fusion: True
  temporal_reduction: 8

#### model weights
save:
  path: ./models/DarkIR_384.pt

Resize: False
